        <script>
            function checkConnection() {
                const img = new Image();
                img.onload = () => {
                    window.location.href = "https://mat-services.github.io/COCC-Compatibility";
                    document.getElementById("statusShow").textContent = `
                        .error {
                            display: unset;
                        }
                        .check {
                            display: none;
                        }
                        .notConnected {
                            display: none;
                        }
                        .unknownError {
                            display: unset;
                        }
                    `;
                };
                img.onerror = () => {
                    document.getElementById("statusShow").textContent = `
                        .error {
                            display: unset;
                        }
                        .check {
                            display: none;
                        }
                        .notConnected {
                            display: unset;
                        }
                        .unknownError {
                            display: none;
                        }
                    `;
                };
                img.src =
                    "https://mat-services.github.io/COCC-Compatibility/ping.png?t="
                    + Date.now();
            }
            checkConnection();
            console.log('Page_Loaded')
            </script>
